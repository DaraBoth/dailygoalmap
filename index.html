    content="goal tracking, goal setting, goal planner, achieve goals, AI goal assistant, goal management, personal development, goal tracker app">

<body>
  <div id="root"></div>
  <svg style="display: none;">
    <filter id="liquidGlass">
      <!-- Softer turbulence, slower movement -->
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="3" seed="2" result="noise">
        <animate attributeName="seed" from="0" to="100" dur="60s" repeatCount="indefinite" />
      </feTurbulence>

      <!-- Displacement to simulate refraction -->
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" />

      <!-- Subtle color & contrast boost for realism -->
      <feColorMatrix type="matrix" values="
        1.05 0 0 0 0
        0 1.05 0 0 0
        0 0 1.05 0 0
        0 0 0 1 0
      " />

      <!-- Gentle blur to smooth edges -->
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </svg>

  <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>
