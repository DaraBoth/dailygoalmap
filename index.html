<body>
  <div id="root"></div>
<svg style="display:none">
  <filter id="liquidGlassEdges" x="0" y="0" width="100%" height="100%">
    <!-- Very subtle turbulence for gentle distortion -->
    <feTurbulence 
      type="fractalNoise" 
      baseFrequency="0.001 0.02" 
      numOctaves="2" 
      seed="8" 
      result="noise">
      <animate attributeName="seed" from="0" to="100" dur="80s" repeatCount="indefinite" />
    </feTurbulence>

    <!-- Mask effect to limit distortion to edges only -->
    <feComposite in="SourceAlpha" in2="noise" operator="in" result="edgeDistortion" />

    <!-- Apply mild refraction to edges -->
    <feDisplacementMap 
      in="SourceGraphic" 
      in2="edgeDistortion" 
      scale="8" 
      xChannelSelector="R" 
      yChannelSelector="G" 
      result="displaced" />

    <!-- Light highlight along edges -->
    <feSpecularLighting 
      in="edgeDistortion" 
      surfaceScale="1.2" 
      specularConstant="0.6" 
      specularExponent="25" 
      lighting-color="white" 
      result="light">
      <fePointLight x="0" y="-100" z="200" />
    </feSpecularLighting>

    <!-- Blend original and light for glossy edges -->
    <feBlend in="displaced" in2="light" mode="screen" />
  </filter>
</svg>
